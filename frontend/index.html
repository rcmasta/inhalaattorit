<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="./css/styles.css">
        <title>Inhalaattorit.fi</title>
    </head>

    <body>
        <header>
            <h1>Inhalaattorit.fi</h1>
            <nav>
                <ul>
                    <li><a href="#">Inhalaattorit</a></li>
                    <li><a href="#">Tietoa sivustosta</a></li>
                    <li><a href="#">Palaute</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="search-name">
                <search title="Hae inhalaattoria nimellä">
                    <label for="inhaler-name">Hae nimellä</label>
                    <input type="search" id="inhaler-name" name="a"/>
                    <button>Hae</button>
                </search>
            </section>
            
            <section class="search-filter">
                <search title="Suodattimet">
                    <label for="inhaler-form-select">Lääkemuoto</label>
                    <select name="inhaler-form" id="inhaler-form-select">
                        <option value="">Valitse lääkemuoto</option>
                    </select>

                    <label for="inhaler-age-select">Ikä</label>
                    <select name="inhaler-age" id="inhaler-age-select">
                        <option value="">Valitse ikä</option>
                    </select>

                    <label for="inhaler-velocity-select">Sisäänhengitysnopeus</label>
                    <select name="inhaler-velocity" id="inhaler-velocity-select">
                        <option value="">Valitse sisäänhengitysnopeus</option>
                    </select>

                    <label for="inhaler-coordination-select">Koordinaatio</label>
                    <select name="inhaler-coordination" id="inhaler-coordination-select">
                        <option value="">Valitse koordinaatiokyky</option>
                    </select>

                    <label for="inhaler-type-select">Inhalaattori</label>
                    <select name="inhaler-type" id="inhaler-type-select">
                        <option value="">Valitse inhalaattori</option>
                    </select>

                    <label for="inhaler-purpose-select">Käyttötarkoitus</label>
                    <select name="inhaler-purpose" id="inhaler-purpose-select">
                        <option value="">Valitse käyttötarkoitus</option>
                    </select>

                    <label for="inhaler-active-substance-select">Vaikuttava lääkeaine</label>
                    <select name="inhaler-active-substance" id="inhaler-active-substance-select">
                        <option value="">Valitse vaikuttava lääkeaine</option>
                    </select>

                    <label for="inhaler-color-select">Väri</label>
                    <select name="inhaler-color" id="inhaler-color-select">
                        <option value="">Valitse väri</option>
                    </select>
                </search>
            </section>

            <section class="results">
                <h2>Tulokset</h2>
            </section>
        </main>

        <footer>
            <p>Stuff</p>
        </footer>
    </body>
</html>
