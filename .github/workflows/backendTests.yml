on:
  push:
    branches: [main, dev, actions]
  pull_request:
    branches: [main, dev]

name: Automated test for backend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
        
      - name: Install dependencies
        run: npm install

      - name: Run test cases
        run: npm test